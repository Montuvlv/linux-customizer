<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinuxForge 🐧</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --sidebar-bg: #f0f0f0;
            --accent-color: #007aff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --card-bg: #ffffff;
            --border-color: rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
        }

        /* Sidebar */
        aside {
            width: 220px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding-top: 50px;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            padding: 10px 20px;
            margin: 2px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover { background: rgba(0,0,0,0.05); }
        .nav-item.active { background: var(--accent-color); color: white; }

        /* Main Content */
        main {
            flex-grow: 1;
            padding: 60px 50px;
            overflow-y: auto;
        }

        header {
            -webkit-app-region: drag;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
        }

        .win-btn {
            -webkit-app-region: no-drag;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 8px;
            cursor: pointer;
            border: none;
        }
        .close { background: #ff5f56; }
        .min { background: #ffbd2e; }

        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; }
        
        /* Minimal Cards */
        .section-group {
            max-width: 600px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .row label { font-size: 0.95rem; font-weight: 500; }
        .row span { font-size: 0.85rem; color: var(--text-secondary); }

        /* Inputs */
        select, input[type="range"] {
            background: #f5f5f7;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.9rem;
            outline: none;
        }

        button.apply-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
            transition: opacity 0.2s;
        }
        button.apply-btn:hover { opacity: 0.8; }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .theme-option {
            height: 60px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .theme-option.active { border-color: var(--accent-color); }

        section { display: none; animation: slideUp 0.3s ease-out; }
        section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header>
        <div class="win-btn min" id="min-btn"></div>
        <div class="win-btn close" id="close-btn"></div>
    </header>
    
    <aside>
        <div class="nav-item active" data-section="wallpaper">🖼 Wallpaper</div>
        <div class="nav-item" data-section="dock">⬜ Dock</div>
        <div class="nav-item" data-section="themes">🎨 Themes</div>
        <div class="nav-item" data-section="fonts">🔤 Fonts</div>
        <div class="nav-item" data-section="cursor">🖱 Cursor</div>
        <div class="nav-item" data-section="effects">✨ Effects</div>
    </aside>

    <main>
        <!-- Wallpaper -->
        <section id="wallpaper" class="active">
            <h1>Wallpaper</h1>
            <div class="section-group">
                <div class="card">
                    <div class="row">
                        <div>
                            <label>Desktop Background</label><br>
                            <span>Choose an image for your desktop</span>
                        </div>
                        <button id="pick-wallpaper" style="background: #f5f5f7; color: black; border: 1px solid #ccc; padding: 6px 12px; border-radius: 6px; cursor: pointer;">Choose File...</button>
                    </div>
                    <div class="row">
                        <label>Scaling</label>
                        <select id="wall-scaling">
                            <option value="fill">Fill Screen</option>
                            <option value="fit">Fit to Screen</option>
                            <option value="stretch">Stretch</option>
                        </select>
                    </div>
                    <button class="apply-btn" id="apply-wallpaper">Apply Wallpaper</button>
                </div>
            </div>
        </section>

        <!-- Dock -->
        <section id="dock">
            <h1>Dock</h1>
            <div class="section-group">
                <div class="card">
                    <div class="row">
                        <label>Position</label>
                        <select id="dock-pos">
                            <option value="bottom">Bottom</option>
                            <option value="top">Top</option>
                            <option value="left">Left</option>
                            <option value="right">Right</option>
                        </select>
                    </div>
                    <div class="row">
                        <label>Icon Size</label>
                        <input type="range" id="dock-size" min="32" max="128" value="48">
                    </div>
                    <div class="row">
                        <label>Auto-hide</label>
                        <input type="checkbox" id="dock-hide">
                    </div>
                    <button class="apply-btn" id="apply-dock">Apply Dock Settings</button>
                </div>
            </div>
        </section>

        <!-- Themes -->
        <section id="themes">
            <h1>Themes</h1>
            <div class="section-group">
                <div class="card">
                    <label>Color Scheme</label>
                    <div class="theme-grid">
                        <div class="theme-option active" style="background: #fff; color: #000;" data-theme="light">Light</div>
                        <div class="theme-option" style="background: #24292e; color: #fff;" data-theme="dark">Dark</div>
                        <div class="theme-option" style="background: #2e3440; color: #88c0d0;" data-theme="nord">Nord</div>
                        <div class="theme-option" style="background: #1e1e2e; color: #cba6f7;" data-theme="catppuccin">Catppuccin</div>
                        <div class="theme-option" style="background: #002b36; color: #268bd2;" data-theme="solarized">Solarized</div>
                        <div class="theme-option" style="background: #282828; color: #ebdbb2;" data-theme="gruvbox">Gruvbox</div>
                    </div>
                </div>
                <div class="card">
                    <div class="row">
                        <label>Accent Color</label>
                        <input type="color" id="accent-color-picker" value="#007aff">
                    </div>
                    <button class="apply-btn" id="apply-theme">Apply Theme</button>
                </div>
            </div>
        </section>

        <!-- Fonts -->
        <section id="fonts">
            <h1>Fonts</h1>
            <div class="section-group">
                <div class="card">
                    <div class="row">
                        <label>System Font</label>
                        <select id="font-family">
                            <option>Inter</option>
                            <option>Ubuntu</option>
                            <option>Roboto</option>
                            <option>Noto Sans</option>
                        </select>
                    </div>
                    <div class="row">
                        <label>Size</label>
                        <input type="range" id="font-size" min="8" max="20" value="11">
                    </div>
                    <button class="apply-btn" id="apply-fonts">Apply Fonts</button>
                </div>
            </div>
        </section>

        <!-- Cursor -->
        <section id="cursor">
            <h1>Cursor</h1>
            <div class="section-group">
                <div class="card">
                    <div class="row">
                        <label>Theme</label>
                        <select id="cursor-theme">
                            <option>Breeze</option>
                            <option>DMZ White</option>
                            <option>DMZ Black</option>
                            <option>Adwaita</option>
                        </select>
                    </div>
                    <div class="row">
                        <label>Size</label>
                        <select id="cursor-size">
                            <option value="24">Small (24)</option>
                            <option value="32">Medium (32)</option>
                            <option value="48">Large (48)</option>
                            <option value="64">X-Large (64)</option>
                        </select>
                    </div>
                    <button class="apply-btn" id="apply-cursor">Apply Cursor</button>
                </div>
            </div>
        </section>

        <!-- Effects -->
        <section id="effects">
            <h1>Effects</h1>
            <div class="section-group">
                <div class="card">
                    <div class="row">
                        <label>Blur Background</label>
                        <input type="checkbox" checked id="fx-blur">
                    </div>
                    <div class="row">
                        <label>Wobbly Windows</label>
                        <input type="checkbox" id="fx-wobbly">
                    </div>
                    <div class="row">
                        <label>Magic Lamp</label>
                        <input type="checkbox" id="fx-lamp">
                    </div>
                    <div class="row">
                        <label>Animation Speed</label>
                        <input type="range" id="fx-speed" min="1" max="10" value="5">
                    </div>
                    <button class="apply-btn" id="apply-effects">Apply Effects</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(item.dataset.section).classList.add('active');
            });
        });

        // Window controls
        document.getElementById('min-btn').onclick = () => window.electron.minimize();
        document.getElementById('close-btn').onclick = () => window.electron.close();

        // Theme switching UI
        document.querySelectorAll('.theme-option').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            };
        });

        // Apply Logic
        document.getElementById('apply-wallpaper').onclick = async () => {
            const scale = document.getElementById('wall-scaling').value;
            await window.electron.setWallpaperScale(scale);
            const result = await window.electron.applyWallpaper();
            if (result.success) alert('Wallpaper applied!');
        };

        document.getElementById('apply-dock').onclick = async () => {
            const pos = document.getElementById('dock-pos').value;
            const size = document.getElementById('dock-size').value;
            await window.electron.updateDock(pos, size);
            alert('Dock settings updated!');
        };

        document.getElementById('apply-theme').onclick = () => {
            const theme = document.querySelector('.theme-option.active').dataset.theme;
            const accent = document.getElementById('accent-color-picker').value;
            console.log('Applying theme:', theme, accent);
            alert(`Theme ${theme} with accent ${accent} applied!`);
        };

        document.getElementById('apply-fonts').onclick = () => {
            const font = document.getElementById('font-family').value;
            const size = document.getElementById('font-size').value;
            alert(`Font ${font} at ${size}px applied!`);
        };

        document.getElementById('apply-cursor').onclick = () => {
            const theme = document.getElementById('cursor-theme').value;
            const size = document.getElementById('cursor-size').value;
            alert(`Cursor ${theme} (${size}) applied!`);
        };

        document.getElementById('apply-effects').onclick = () => {
            alert('Desktop effects applied!');
        };
    </script>
</body>
</html>
